services:
  discord-offkai-bot:
    build: .
    container_name: discord-offkai-bot
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped

  offkai-api:
    build: ./api
    container_name: offkai-api
    volumes:
      - ./data:/app/data:ro
    environment:
      - OFFKAI_API_KEY=${OFFKAI_API_KEY}
    restart: unless-stopped

  chibachan:
    build:
      context: https://github.com/Fadekyun/chibachanners-frontenders.git
      dockerfile: Dockerfile
    container_name: chibachan
    ports:
      - "8090:8090"
    volumes:
      - ./checkins:/app/data
    environment:
      - OFFKAI_API_URL=http://offkai-api:8090
      - OFFKAI_API_KEY=${OFFKAI_API_KEY}
      - OFFKAI_JWT_SECRET=${OFFKAI_JWT_SECRET}
      - ADMIN_KEY=${ADMIN_KEY}
    depends_on:
      - offkai-api
    restart: unless-stopped
